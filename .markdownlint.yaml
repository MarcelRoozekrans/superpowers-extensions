# Disable line-length rule — markdown prose and tables often exceed 80 chars
MD013: false

# Allow emphasis used as heading in plan docs
MD036: false

# Disable closed-atx check (false positive on "### .NET / C#")
MD020: false

# Allow duplicate headings in different sections
MD024:
  siblings_only: true

# Disable table column style — all tables in this repo use compact pipe style
MD060: false

# Allow specific custom XML-ish tags used as semantic markers for skill agents
# (e.g. <HARD-GATE> blocks signal mandatory gates that the agent must obey)
MD033:
  allowed_elements:
    - HARD-GATE
