name: Lint

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  markdown-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: 24

      - run: npm ci

      # Runs the same command as local. The globs live in
      # .markdownlint-cli2.jsonc rather than here, so CI and `npm run lint:md`
      # cannot disagree about which files are linted — they previously did, and
      # the local script failed with thousands of errors while CI stayed green.
      - name: Lint Markdown files
        run: npm run lint:md

  check-registries:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: 24

      - name: Check every plugin is registered everywhere
        run: npm run check:registries

      # Both guards are node-builtins-only by design, so they reuse this job's
      # checkout and node setup and need no `npm ci`.
      - name: Check project-orchestration hardcodes no commit messages or tags
        run: npm run check:conventions

  commitlint:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && !startsWith(github.head_ref, 'release-please--') && github.actor != 'renovate[bot]' && github.actor != 'dependabot[bot]'
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v7
        with:
          node-version: 24

      - run: npm ci

      - name: Validate PR commits
        run: npx commitlint --from ${{ github.event.pull_request.base.sha }} --to ${{ github.event.pull_request.head.sha }} --verbose
